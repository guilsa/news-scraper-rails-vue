---
- name: Setup news.guilsa.com infrastructure
  hosts: production
  become: yes
  gather_facts: yes

  tasks:
    - name: Ensure site directory exists
      file:
        path: "{{ site_root }}"
        state: directory
        owner: www-data
        group: www-data
        mode: '0755'

    - name: Deploy nginx configuration
      template:
        src: ../templates/nginx.conf.j2
        dest: "/etc/nginx/sites-available/{{ site_domain }}.conf"
        owner: root
        group: root
        mode: '0644'
      notify: reload nginx

    - name: Enable site in nginx
      file:
        src: "/etc/nginx/sites-available/{{ site_domain }}.conf"
        dest: "/etc/nginx/sites-enabled/{{ site_domain }}.conf"
        state: link
      notify: reload nginx

    - name: Test nginx configuration
      command: nginx -t
      changed_when: false

  handlers:
    - name: reload nginx
      systemd:
        name: nginx
        state: reloaded
